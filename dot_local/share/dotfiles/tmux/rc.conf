# plugins

# TPM

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'tmux-plugins/tmux-yank'

#

# True Color Support
set -sa terminal-overrides ",*-256color:Tc"

set -g mouse on

set -g display-panes-time 10000

bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

bind c new-window -c "#{pane_current_path}"

#

set -g status-position top

set -g status-left ' #{=/20/…:session_name} '
set -g status-left-length 23 # status-leftに依存 (' ' + 20文字 + '…' + ' ')
set -g status-left-style 'fg=colour202'

set -g status-right ' '
set -g status-right-length 1

set -g status-style 'fg=colour242'

set -g window-status-format ' #{window_index} #{window_name}#{?window_zoomed_flag,  ,} '
set -g window-status-current-format ' #{window_index} #{window_name}#{?window_zoomed_flag,  ,} '
set -g window-status-current-style 'fg=colour202'

set -g pane-border-style 'fg=colour242'
set -g pane-active-border-style 'fg=colour202'

# TPM

run '~/.tmux/plugins/tpm/tpm'

# vim: set ft=tmux:
